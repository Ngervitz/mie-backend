<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MIE — Market Intelligence Center</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.31.0/tabler-icons.min.css" />
  <link rel="stylesheet" href="mie-dashboard.css" />
  <link rel="stylesheet" href="meta-agent.css" />
</head>
<body>
  <div id="mie-dashboard-app">
    <nav class="brief-backnav">
      <a href="/hugo-brief.html" class="brief-backnav-link">
        <i class="ti ti-arrow-left" aria-hidden="true"></i>
        Volver al executive brief
      </a>
    </nav>

    <nav class="dashboard-tabs" role="tablist" aria-label="Secciones del dashboard">
      <button
        type="button"
        class="dashboard-tab active"
        role="tab"
        aria-selected="true"
        data-dashboard-tab="market"
        id="tab-market">
        Inteligencia de mercado
      </button>
      <button
        type="button"
        class="dashboard-tab"
        role="tab"
        aria-selected="false"
        data-dashboard-tab="meta"
        id="tab-meta">
        Meta Ads
      </button>
    </nav>

    <main
      class="app dashboard-panel"
      id="mie-market-root"
      role="tabpanel"
      aria-labelledby="tab-market">
    </main>

    <!-- Meta Ads tab shell: chrome + agent root + changes landing are siblings.
         Visibility toggles only — never rebuild agent DOM from this shell. -->
    <div
      class="dashboard-panel hidden"
      id="meta-ads-panel"
      role="tabpanel"
      aria-labelledby="tab-meta"
      hidden>
      <div id="meta-ads-chrome" class="meta-ads-chrome">
        <div class="meta-ads-chrome-actions">
          <button type="button" id="meta-changes-open-btn" class="mcl-chrome-btn">
            Historial de cambios
          </button>
        </div>
      </div>

      <div id="meta-ads-root"></div>

      <div id="meta-changes-landing" class="mcl-landing hidden" hidden>
        <header class="mcl-header">
          <div class="mcl-header-left">
            <button type="button" id="meta-changes-back-btn" class="mcl-back-btn">
              ← Volver a Meta Ads
            </button>
            <h1 class="mcl-title">Historial de cambios</h1>
            <p class="mcl-subtitle">Registro de actividad de la cuenta publicitaria</p>
          </div>
        </header>

        <div class="mcl-filters" role="group" aria-label="Filtros del historial">
          <label class="mcl-field">
            <span class="mcl-field-label">Tipo</span>
            <select id="mcl-event-type" class="mcl-select">
              <option value="">Todos los tipos</option>
            </select>
          </label>
          <label class="mcl-field">
            <span class="mcl-field-label">Desde</span>
            <input type="date" id="mcl-from" class="mcl-input" />
          </label>
          <label class="mcl-field">
            <span class="mcl-field-label">Hasta</span>
            <input type="date" id="mcl-to" class="mcl-input" />
          </label>
        </div>

        <div id="mcl-status" class="mcl-status" aria-live="polite"></div>
        <div id="mcl-results" class="mcl-results"></div>
        <div id="mcl-pagination" class="mcl-pagination"></div>
      </div>
    </div>
  </div>

  <script>
    window.__META_AGENT_DATASOURCE__ = {
      supabaseUrl: 'https://usezztlmwfgjcidcrrde.supabase.co',
      supabaseAnonKey: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVzZXp6dGxtd2ZnamNpZGNycmRlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3MTYzOTQsImV4cCI6MjA5NzI5MjM5NH0.qZMZoXsGmMvsxqxWN6sX8JT3ZpUhKc4vZrbYyJXUiJ0'
    };
  </script>
  <script src="mie-dashboard.js"></script>
  <script src="meta-agent.js"></script>
  <script>
    (function () {
      'use strict';
      var tabs = document.querySelectorAll('[data-dashboard-tab]');
      var market = document.getElementById('mie-market-root');
      var metaPanel = document.getElementById('meta-ads-panel');
      if (!market || !metaPanel || !tabs.length) return;

      function activate(name) {
        var showMarket = name === 'market';
        market.classList.toggle('hidden', !showMarket);
        metaPanel.classList.toggle('hidden', showMarket);
        if (showMarket) {
          market.removeAttribute('hidden');
          metaPanel.setAttribute('hidden', '');
        } else {
          metaPanel.removeAttribute('hidden');
          market.setAttribute('hidden', '');
        }
        tabs.forEach(function (btn) {
          var on = btn.getAttribute('data-dashboard-tab') === name;
          btn.classList.toggle('active', on);
          btn.setAttribute('aria-selected', on ? 'true' : 'false');
        });
      }

      tabs.forEach(function (btn) {
        btn.addEventListener('click', function () {
          activate(btn.getAttribute('data-dashboard-tab'));
        });
      });
    })();
  </script>
</body>
</html>
