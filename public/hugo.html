<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Hugo</title>
  <link rel="stylesheet" href="hugo.css" />
</head>
<body>
  <div id="scene">

    <!-- Background Layer -->
    <div id="background-layer"></div>

    <!-- Avatar Layer (visual only) -->
    <div id="avatar-layer">
      <div id="avatar-container">

        <video
          id="avatar-video"
          autoplay
          playsinline
          style="width:100%;height:100%;object-fit:cover;display:none;">
        </video>

        <audio
          id="avatar-audio"
          autoplay>
        </audio>

        <div id="avatar-fallback" style="display:none;width:100%;height:100%;">
          <iframe
            src="https://embed.liveavatar.com/v1/a6cf4933-662e-46b9-a113-fd9e0e46f0ea?orientation=horizontal"
            allow="microphone"
            title="Hugo LiveAvatar">
          </iframe>
        </div>

        <div
          id="avatar-status"
          style="position:absolute;left:0;right:0;top:50%;transform:translateY(-50%);text-align:center;color:#cbd5e1;font-size:14px;letter-spacing:0.02em;pointer-events:none;">
        </div>

      </div>
    </div>

    <!-- Intelligence Layer -->
    <div id="intelligence-layer">

      <header id="hugo-header">
        <div class="header-left">HUGO</div>
        <div class="header-center" id="header-date"></div>
        <div class="header-right" id="header-badges"></div>
      </header>

      <!-- MIE-23: abstract Hugo presence (hidden in avatar mode) -->
      <div id="hugo-presence" class="hidden" aria-hidden="true">
        <div class="presence-orb" aria-hidden="true">
          <span class="presence-core"></span>
          <span class="presence-ring"></span>
          <span class="presence-line"></span>
        </div>
      </div>

      <div id="left-col">
        <section id="brief-panel" class="panel"></section>
        <section id="questions-panel" class="panel chapter hidden"></section>
      </div>

      <aside id="market-panel" class="panel chapter hidden"></aside>

      <section id="execution-panel" class="panel chapter hidden"></section>

      <section id="answer-panel" class="panel hidden"></section>

    </div>

    <!-- Workspace Layer -->
    <div id="workspace-layer">
      <!-- MIE-15: Hugo actions render here -->
    </div>

    <!-- Input Layer -->
    <div id="input-layer">
      <div id="input-wrap">
        <textarea id="question-input" rows="1" placeholder="Preguntale a Hugo..."></textarea>
        <button id="send-btn" type="button">Enviar</button>
      </div>
      <div id="input-error"></div>
    </div>

    <!-- Full-screen overlay (load errors) -->
    <div id="overlay" class="hidden"></div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/livekit-client/dist/livekit-client.umd.min.js"></script>
  <script src="hugo.js"></script>
</body>
</html>
